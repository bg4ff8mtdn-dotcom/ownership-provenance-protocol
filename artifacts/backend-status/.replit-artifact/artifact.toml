kind = "web"
previewPath = "/"
title = "Ownership & Provenance Protocol"
version = "1.0.0"
id = "artifacts/backend-status"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23581

[services.development]
run = "pnpm --filter @workspace/backend-status run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/backend-status", "run", "build" ]
publicDir = "artifacts/backend-status/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23581"
BASE_PATH = "/"
